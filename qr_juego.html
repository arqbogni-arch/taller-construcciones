<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QR — Taller de Construcciones</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    border: 2px solid #c0392b;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    text-align: center;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }
  .logo { font-size: 48px; margin-bottom: 0.8rem; }
  h1 { font-size: 20px; font-weight: 700; color: #c0392b; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #555; margin-bottom: 1.4rem; line-height: 1.5; }
  #qr-canvas { margin: 0 auto 1.2rem; display: flex; justify-content: center; }
  .instruccion {
    font-size: 14px;
    color: #333;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .pie {
    font-size: 12px;
    color: #777;
    margin-bottom: 1.2rem;
    line-height: 1.5;
  }
  .url-box {
    background: #f9f9f9;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    color: #555;
    word-break: break-all;
    margin-bottom: 1.2rem;
  }
  .btn-imprimir {
    display: inline-block;
    padding: 10px 28px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 0.5rem;
  }
  .btn-imprimir:hover { background: #922b21; }

  @media print {
    body { background: white; padding: 0; }
    .btn-imprimir { display: none; }
    .card { border: 2px solid #000; box-shadow: none; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏗️</div>
  <h1>Taller de Construcciones</h1>
  <p class="sub">E.P.E.T. N.° 1 Ing. Rogelio Boero<br>3.er año · Prof. Bogni · 2026</p>

  <div id="qr-canvas"></div>

  <p class="instruccion">📱 Escaneá el QR para jugar</p>
  <p class="pie">
    20 preguntas · Una sola oportunidad<br>
    Los resultados se envían automáticamente a la profesora
  </p>

  <div class="url-box" id="url-display"></div>

  <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir esta página</button>
</div>

<script>
  const URL_JUEGO = 'https://arqbogni-arch.github.io/taller-construcciones/juego_construcciones_epet1.html';

  document.getElementById('url-display').textContent = URL_JUEGO;

  new QRCode(document.getElementById('qr-canvas'), {
    text: URL_JUEGO,
    width: 200,
    height: 200,
    colorDark: '#c0392b',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
</script>
</body>
</html>
